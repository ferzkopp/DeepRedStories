<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEEP RED — Stories</title>
  <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Bar: Brand + Game Info -->
  <div id="top-bar">
    <div id="brand">
      <div class="brand-logo-group">
        <img src="img/deepredlogo_3D_.webp" alt="Deep Red" class="brand-logo">
        <span class="brand-stories">Stories</span>
      </div>
      <span class="brand-subtitle">Dispatches from the Deep Red Continuum:<br>Chess Insights of an Unsupervised Mind</span>
    </div>
    <div class="bar-divider"></div>
    <div id="game-info">
      <div class="info-row">
        <span id="white-name" class="player-name white-player">♔ White</span>
        <span class="vs">vs</span>
        <span id="black-name" class="player-name black-player">♚ Black</span>
      </div>
      <div class="info-row info-meta">
        <span id="game-event" class="info-tag"></span>
        <span id="game-date" class="info-tag"></span>
        <span id="game-eco" class="info-tag"></span>
        <span id="game-result" class="info-tag result-tag"></span>
        <span id="total-duration" class="info-tag duration-tag"></span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Chessboard -->
    <div id="board-container">
      <div id="board" style="width: 100%"></div>
    </div>

    <!-- Move List Sidebar -->
    <div id="move-panel">
      <h3>Moves</h3>
      <div id="move-list"></div>
    </div>
  </main>

  <!-- Controls Bar -->
  <div id="controls-bar">
    <button id="btn-play" class="ctrl-btn" title="Play / Pause">▶</button>
    <button id="btn-fast-forward" class="ctrl-btn" title="Fast Forward" disabled>⏩</button>
    <button id="btn-new-game" class="ctrl-btn" title="New Game">⟳ New Game</button>

    <label id="auto-continue-label" class="ctrl-checkbox" title="Automatically play the next game after each game ends">
      <input type="checkbox" id="chk-auto-continue">
      <span class="checkmark"></span>
      Auto-Continue
    </label>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <span id="game-counter" class="info-tag">Game: 0/0</span>
    <span id="move-counter" class="info-tag">Move: 0/0</span>
  </div>

  <!-- Narrative Subtitle -->
  <div id="narrative-bar">
    <span id="segment-duration" class="info-tag duration-tag"></span>
    <p id="narrative-text">Deep Red standing by. Select "New Game" to begin analysis...</p>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <img src="img/deepredlogo_3D_.webp" alt="Deep Red" class="loading-logo">
    <div class="spinner"></div>
    <p>Deep Red is thinking...</p>
  </div>

  <footer style="text-align:center;padding:12px 0 8px;font-size:0.7rem;color:#555;">
    DEEP RED Stories by A. Schiffler · MIT License · <a href="https://github.com/ferzkopp/DeepRedStories/tree/main" style="color:#555;" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="js/chess-0.10.3.min.js"></script>
  <script src="js/chessboard-1.0.0.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
